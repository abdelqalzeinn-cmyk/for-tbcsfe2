name: Build Android JNI Library

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build libbcsfe_rs.so (arm64-v8a)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-linux-android

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Android NDK
        run: |
          NDK_VERSION=r27b
          wget -q "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
          unzip -q "android-ndk-${NDK_VERSION}-linux.zip"
          echo "NDK_ROOT=$(pwd)/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Patch Cargo.toml for rustls (avoid OpenSSL cross-compile issues)
        run: |
          sed -i 's/reqwest = { version = "0.12", optional = true, features = \["json", "multipart"\] }/reqwest = { version = "0.12", optional = true, features = ["json", "multipart", "rustls-tls"], default-features = false }/' Cargo.toml

      - name: Install Android NDK
        run: |
          NDK_VERSION=r27b
          wget -q "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
          unzip -q "android-ndk-${NDK_VERSION}-linux.zip"
          echo "NDK_ROOT=$(pwd)/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Build JNI library (arm64-v8a) - direct cargo
        run: |
          cargo build -p bcsfe_rs --target aarch64-linux-android --release --features jni
        env:
          NDK_ROOT: ${{ env.NDK_ROOT }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ env.NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang

      - name: Verify library
        run: |
          ls -la target/aarch64-linux-android/release/ 2>/dev/null | head -20
          find . -name "libbcsfe_rs.so" -type f 2>/dev/null

      - name: Copy to output
        run: |
          mkdir -p out/arm64-v8a
          cp target/aarch64-linux-android/release/libbcsfe_rs.so out/arm64-v8a/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libbcsfe_rs-android-arm64
          path: |
            out/arm64-v8a/libbcsfe_rs.so
            target/aarch64-linux-android/release/libbcsfe_rs.so
          retention-days: 30
